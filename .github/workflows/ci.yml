name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Compile Python
        run: python3 -m compileall -q scripts tests
      - name: Check browser JavaScript
        run: |
          node --check assets/app.js
          node --check tools/capture-release-assets.mjs
      - name: Run tests
        run: python3 -m unittest discover -s tests -v
      - name: Audit release tree
        run: python3 scripts/release_audit.py .
      - name: Build release archives
        run: python3 scripts/package_release.py
